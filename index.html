<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jorge Naranjo | Actor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --bg: #000000; --accent: #333333; }
        body { 
            background-color: var(--bg); color: var(--primary); 
            font-family: 'Playfair Display', serif; margin: 0; padding: 20px; text-align: center;
            -webkit-user-select: none; user-select: none;
        }
        h1 { font-style: italic; letter-spacing: 4px; font-size: 2.5em; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { letter-spacing: 8px; font-size: 0.9em; text-transform: uppercase; margin-bottom: 40px; color: #888; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto 60px; }
        .video-item { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #111; border-radius: 4px; }
        .video-item iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* GALERÍA CON EFECTO BLANCO Y NEGRO */
        .gallery-title { font-style: italic; font-size: 1.8em; margin: 60px 0 30px; border-top: 1px solid var(--accent); padding-top: 40px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        
        .gallery-grid img { 
            width: 100%; height: 350px; object-fit: cover; border-radius: 4px; 
            filter: grayscale(100%); /* Blanco y negro por defecto */
            transition: 0.5s ease; cursor: pointer;
        }
        
        .gallery-grid img:hover { filter: grayscale(0%); transform: scale(1.02); }

        /* MODAL PARA AGRANDAR FOTO */
        #modal {
            display: none; position: fixed; z-index: 999; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); align-items: center; justify-content: center;
        }
        #modal img { max-width: 90%; max-height: 90%; border: 2px solid #fff; filter: grayscale(0%); }

        .contact-mail { color: #ffffff; text-decoration: none; font-size: 1.2em; letter-spacing: 2px; -webkit-user-select: auto; user-select: auto; }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>Jorge Naranjo</h1>
    <p class="subtitle">VIDEO-BOOK</p>

    <div class="video-grid">
        <div class="video-item">
            <iframe src="https://player.vimeo.com/video/1174518952?badge=0&autopause=0&title=0&byline=0&portrait=0" allow="autoplay; fullscreen"></iframe>
        </div>
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1166571898?title=0&byline=0&portrait=0"></iframe></div>
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1166572058?title=0&byline=0&portrait=0"></iframe></div>
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1166572097?title=0&byline=0&portrait=0"></iframe></div>
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1166560186?title=0&byline=0&portrait=0"></iframe></div>
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1166556800?title=0&byline=0&portrait=0"></iframe></div>
    </div>

    <div class="gallery-title">Galería</div>
    
    <div class="gallery-grid">
        <img src="Photos/FOTO 1.webp" onclick="openModal(this.src)">
        <img src="Photos/FOTO 2.webp" onclick="openModal(this.src)">
        <img src="Photos/FOTO 3.webp" onclick="openModal(this.src)">
        <img src="Photos/FOTO 4.webp" onclick="openModal(this.src)">
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="modalImg">
    </div>

    <footer style="margin-top: 100px; padding-bottom: 50px; color: #555;">
        <p style="letter-spacing: 2px;">CONTACTO</p>
        <a href="mailto:contacto.jorgenaranjo@gmail.com" class="contact-mail">contacto.jorgenaranjo@gmail.com</a>
        <p>&copy; 2026 Jorge Naranjo</p>
    </footer>

    <script>
        // Función para agrandar la foto
        function openModal(src) {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalImg').src = src;
        }

        // Bloqueo de teclas de inspección
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
        }
    </script>
</body>
</html>
