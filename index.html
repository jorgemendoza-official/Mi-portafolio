<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jorge Naranjo | Actor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --bg: #000000; --accent: #111111; --text-muted: #666666; }
        
        body { 
            background-color: var(--bg); color: var(--primary); 
            font-family: 'Playfair Display', serif; margin: 0; padding: 20px; text-align: center;
            -webkit-user-select: none; user-select: none;
        }

        h1 { font-style: italic; letter-spacing: 4px; font-size: 2.5em; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { letter-spacing: 8px; font-size: 0.9em; text-transform: uppercase; margin-bottom: 40px; color: var(--text-muted); }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto 60px; }
        .video-item { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #080808; border-radius: 4px; border: 1px solid #1a1a1a; }
        .video-item iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* --- NUEVA FICHA TÉCNICA (SLATE CARD) --- */
        .slate-card { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(145deg, #0f0f0f, #050505); cursor: pointer; transition: 0.4s ease;
        }
        .slate-card:hover { background: #000; border: 1px solid #444; }

        .slate-header { font-size: 0.75em; letter-spacing: 5px; color: #888; margin-bottom: 20px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 8px; width: 85%; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; width: 90%; }
        .data-item { display: flex; flex-direction: column; align-items: center; }
        .val { font-size: 1.1em; font-weight: bold; color: #fff; letter-spacing: 1px; }
        .lbl { font-size: 0.5em; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
        
        .footer-tags { margin-top: 25px; font-size: 0.55em; color: #444; letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }

        /* MODAL EXPANSIÓN */
        #modal-overlay { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        #modal-image { max-width: 90%; max-height: 90%; border: 1px solid #fff; display: none; }
        #modal-slate-content { 
            display: none; background: #000; padding: 50px; border: 1px solid #333; 
            border-radius: 8px; width: 90%; max-width: 800px; text-align: center; 
        }
        #modal-slate-content .val { font-size: 2.2em; }
        #modal-slate-content .lbl { font-size: 0.8em; margin-top: 8px; }
        #modal-slate-content .slate-header { font-size: 1.2em; margin-bottom: 40px; }
        #modal-slate-content .footer-tags { font-size: 1em; margin-top: 40px; }

        .gallery-title { font-style: italic; font-size: 1.8em; margin: 60px 0 30px; border-top: 1px solid #222; padding-top: 40px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .gallery-grid img { width: 100%; height: 350px; object-fit: cover; border-radius: 4px; filter: grayscale(100%); transition: 0.5s ease; cursor: pointer; }
        .gallery-grid img:hover { filter: grayscale(0%); transform: scale(1.02); }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>Jorge Naranjo</h1>
    <p class="subtitle">PERFIL ACTORAL</p>

    <div class="video-grid">
        <div class="video-item">
            <iframe src="https://player.vimeo.com/video/1174518952?title=0&byline=0&portrait=0" allow="autoplay; fullscreen"></iframe>
        </div>

        <div class="video-item">
            <iframe src="https://player.vimeo.com/video/1166571898?title=0&byline=0&portrait=0"></iframe>
        </div>

        <div class="video-item">
            <iframe src="https://player.vimeo.com/video/1166572058?title=0&byline=0&portrait=0"></iframe>
        </div>

        <div class="video-item">
            <iframe src="https://player.vimeo.com/video/1166572097?title=0&byline=0&portrait=0"></iframe>
        </div>

        <div class="video-item">
            <iframe src="https://player.vimeo.com/video/1166560186?title=0&byline=0&portrait=0"></iframe>
        </div>

        <div class="video-item" onclick="expandSlate()">
            <div class="slate-card" id="main-slate">
                <div class="slate-header">Physical Profile</div>
                
                <div class="data-grid">
                    <div class="data-item"><span class="val">168</span><span class="lbl">Estatura (cm)</span></div>
                    <div class="data-item"><span class="val">67.5</span><span class="lbl">Peso (kg)</span></div>
                    <div class="data-item"><span class="val">Verdes</span><span class="lbl">Ojos</span></div>
                    <div class="data-item"><span class="val">39</span><span class="lbl">Calzado (EU)</span></div>
                    <div class="data-item"><span class="val">106</span><span class="lbl">Pecho (cm)</span></div>
                    <div class="data-item"><span class="val">75</span><span class="lbl">Cintura (cm)</span></div>
                </div>

                <div class="footer-tags">
                    CAN / COL — PIEL: TRIGUEÑA — PANTALÓN: 29-30
                </div>
            </div>
        </div>
    </div>

    <div class="gallery-title">Galería</div>
    <div class="gallery-grid">
        <img src="Photos/FOTO 1.webp" onclick="expandImage(this.src)">
        <img src="Photos/FOTO 2.webp" onclick="expandImage(this.src)">
        <img src="Photos/FOTO 3.webp" onclick="expandImage(this.src)">
        <img src="Photos/FOTO 4.webp" onclick="expandImage(this.src)">
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <img id="modal-image">
        <div id="modal-slate-content" onclick="event.stopPropagation()"></div>
    </div>

    <footer style="margin-top: 100px; padding-bottom: 50px; color: #555;">
        <a href="mailto:contacto.jorgenaranjo@gmail.com" style="color:#fff; text-decoration:none; letter-spacing: 2px;">contacto.jorgenaranjo@gmail.com</a>
        <p>&copy; 2026 Jorge Naranjo</p>
    </footer>

    <script>
        const overlay = document.getElementById('modal-overlay');
        const modalImg = document.getElementById('modal-image');
        const modalSlate = document.getElementById('modal-slate-content');

        function expandImage(src) {
            overlay.style.display = 'flex';
            modalImg.style.display = 'block';
            modalSlate.style.display = 'none';
            modalImg.src = src;
        }

        function expandSlate() {
            const content = document.getElementById('main-slate').innerHTML;
            modalSlate.innerHTML = content;
            overlay.style.display = 'flex';
            modalImg.style.display = 'none';
            modalSlate.style.display = 'block';
        }

        function closeModal() { overlay.style.display = 'none'; }
    </script>
</body>
</html>
