<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jorge Mendoza | Actor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --bg: #000000; --accent: #111111; --text-muted: #666666; }
        body { background-color: var(--bg); color: var(--primary); font-family: 'Playfair Display', serif; margin: 0; padding: 20px; text-align: center; -webkit-user-select: none; user-select: none; }
        
        h1 { font-style: italic; letter-spacing: 4px; font-size: 2.2em; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { letter-spacing: 6px; font-size: 0.8em; text-transform: uppercase; margin-bottom: 40px; color: var(--text-muted); }
        
        /* DISEÑO: VIDEO + FICHA TÉCNICA */
        .featured-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto 60px;
        }

        .video-featured {
            flex: 1;
            min-width: 300px;
            position: relative;
            padding-bottom: 45%;
            height: 0;
            overflow: hidden;
            background: #080808;
            border-radius: 4px;
            border: 1px solid #1a1a1a;
        }
        .video-featured iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .slate-sidebar {
            width: 350px;
            flex-shrink: 0;
            background: linear-gradient(145deg, #0f0f0f, #050505);
            border: 1px solid #222;
            border-radius: 8px;
            padding: 30px;
            text-align: left;
            box-sizing: border-box;
        }
        .sidebar-title { font-size: 1.4em; font-style: italic; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 10px; color: #fff; text-align: center;}
        
        .full-grid-sidebar { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            margin-bottom: 25px;
        }
        .full-item { border-bottom: 1px solid #111; padding-bottom: 10px; text-align: center; }
        .full-val { font-size: 1.2em; font-weight: bold; display: block; color: #fff;}
        .full-lbl { font-size: 0.55em; color: #666; text-transform: uppercase; letter-spacing: 1px;}

        .perfil-info { font-size: 0.8em; line-height: 1.8; color: #ccc;}
        .perfil-info strong { color: #fff; font-weight: bold;}

        /* GALERÍA VERTICAL */
        .gallery-title { font-style: italic; font-size: 1.8em; margin: 60px 0 30px; border-top: 1px solid #222; padding-top: 40px; }
        .gallery-grid { display: flex; justify-content: center; width: 100%; margin: 0 auto; }
        
        .album-box { cursor: pointer; width: 320px; text-align: center; }
        .album-box img { 
            width: 320px !important;
            height: 480px !important;
            object-fit: cover; 
            border-radius: 4px; 
            filter: grayscale(100%); 
            transition: 0.5s; 
            border: 1px solid #222; 
        }
        .album-box:hover img { filter: grayscale(0%); border-color: #fff; transform: scale(1.02); }
        .album-label { margin-top: 15px; font-size: 0.75em; letter-spacing: 3px; color: #fff; text-transform: uppercase; font-weight: bold; }

        /* VISUALIZADOR */
        #modal-overlay { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); align-items: center; justify-content: center; }
        #modal-image { max-width: 90%; max-height: 85vh; object-fit: contain; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: white; font-size: 30px; cursor: pointer; padding: 20px; transition: 0.3s; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }
        .close-btn { position: absolute; top: 25px; right: 35px; font-size: 45px; color: #fff; cursor: pointer; }
        
        footer { margin-top: 100px; padding-bottom: 50px; color: #444; }
        .contact-mail { color: #fff; text-decoration: none; font-size: 1.1em; letter-spacing: 2px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>Jorge Mendoza</h1>
    <p class="subtitle">ACTOR</p>

    <div class="featured-row">
        <div class="video-featured">
            <iframe src="https://player.vimeo.com/video/1174518952?title=0&byline=0&portrait=0" allow="autoplay; fullscreen"></iframe>
        </div>
        
        <div class="slate-sidebar">
            <h2 class="sidebar-title">Ficha Técnica</h2>
            <div class="full-grid-sidebar">
                <div class="full-item"><span class="full-val">168cm</span><span class="full-lbl">Estatura</span></div>
                <div class="full-item"><span class="full-val">67.5kg</span><span class="full-lbl">Peso</span></div>
                <div class="full-item"><span class="full-val">Verdes</span><span class="full-lbl">Ojos</span></div>
                <div class="full-item"><span class="full-val">M</span><span class="full-lbl">Camisa</span></div>
                <div class="full-item"><span class="full-val">29-30</span><span class="full-lbl">Pantalón</span></div>
                <div class="full-item"><span class="full-val">39</span><span class="full-lbl">Calzado</span></div>
            </div>
            <div class="perfil-info">
                <strong>Nacionalidad:</strong> Colombo-Canadiense<br>
                <strong>Idiomas:</strong> Español (Nativo) / Inglés (Fluido)<br>
                <strong>Edad:</strong> 65 años
            </div>
        </div>
    </div>

    <div class="gallery-title">Book Actoral</div>
    <div class="gallery-grid">
        <div class="album-box" onclick="openAlbum(1, 20)">
            <img src="Photos/Album1/FOTO_1_1.webp">
            <div class="album-label">Sesión Principal (20 fotos)</div>
        </div>
    </div>

    <div id="modal-overlay">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <button id="btn-prev" class="nav-btn prev-btn" onclick="changeImg(-1)">&#10094;</button>
        <img id="modal-image" src="">
        <button id="btn-next" class="nav-btn next-btn" onclick="changeImg(1)">&#10095;</button>
    </div>

    <footer>
        <a href="mailto:contacto.jorgenaranjo@gmail.com" class="contact-mail">contacto.jorgenaranjo@gmail.com</a>
        <p>&copy; 2026 Jorge Mendoza</p>
    </footer>

    <script>
        let currentImgIdx = 1;
        let maxImgs = 20; 
        const overlay = document.getElementById('modal-overlay');
        const modalImg = document.getElementById('modal-image');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        function openAlbum(num, total) {
            currentImgIdx = 1;
            maxImgs = total;
            overlay.style.display = 'flex';
            modalImg.style.display = 'block';
            btnPrev.style.display = 'flex';
            btnNext.style.display = 'flex';
            updateModalImage();
        }

        function changeImg(step) {
            currentImgIdx += step;
            if (currentImgIdx > maxImgs) currentImgIdx = 1;
            if (currentImgIdx < 1) currentImgIdx = maxImgs;
            updateModalImage();
        }

        function updateModalImage() {
            modalImg.src = `Photos/Album1/FOTO_1_${currentImgIdx}.webp?v=${new Date().getTime()}`;
        }

        function closeModal() { overlay.style.display = 'none'; }
    </script>
</body>
</html>
