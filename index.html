<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jorge Mendoza | Actor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --bg: #000000; --accent: #111111; --text-muted: #666666; }
        body { background-color: var(--bg); color: var(--primary); font-family: 'Playfair Display', serif; margin: 0; padding: 20px; text-align: center; -webkit-user-select: none; user-select: none; }
        h1 { font-style: italic; letter-spacing: 4px; font-size: 2.2em; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { letter-spacing: 6px; font-size: 0.8em; text-transform: uppercase; margin-bottom: 40px; color: var(--text-muted); }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto 60px; }
        .video-item { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #080808; border-radius: 4px; border: 1px solid #1a1a1a; }
        .video-item iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .slate-card { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(145deg, #0f0f0f, #050505); cursor: pointer; transition: 0.4s ease; }
        .slate-card:hover { border: 1px solid #444; background: #000; }
        .data-grid-mini { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90%; }
        .mini-val { font-size: 1em; font-weight: bold; color: #fff; }
        .mini-lbl { font-size: 0.45em; color: var(--text-muted); text-transform: uppercase; }
        .gallery-title { font-style: italic; font-size: 1.8em; margin: 60px 0 30px; border-top: 1px solid #222; padding-top: 40px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .album-box { cursor: pointer; transition: 0.4s; position: relative; }
        .album-box img { width: 100%; height: 400px; object-fit: cover; border-radius: 4px; filter: grayscale(100%); transition: 0.5s; border: 1px solid #222; }
        .album-box:hover img { filter: grayscale(0%); border-color: #fff; transform: scale(1.02); }
        .album-label { margin-top: 12px; font-size: 0.75em; letter-spacing: 3px; color: #fff; text-transform: uppercase; font-weight: bold; }
        #modal-overlay { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); align-items: center; justify-content: center; }
        #modal-image { max-width: 90%; max-height: 85vh; object-fit: contain; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: white; font-size: 30px; cursor: pointer; padding: 20px; transition: 0.3s; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }
        .close-btn { position: absolute; top: 25px; right: 35px; font-size: 45px; color: #fff; cursor: pointer; transition: 0.3s; }
        #modal-content-wrapper { display: none; background: #000; padding: 40px; border: 1px solid #222; width: 90%; max-width: 800px; color: white; border-radius: 8px; text-align: left; }
        .full-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 20px; margin-top: 30px; }
        .full-item { border-bottom: 1px solid #111; padding-bottom: 10px; }
        .full-val { font-size: 1.4em; font-weight: bold; display: block; }
        .full-lbl { font-size: 0.6em; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        footer { margin-top: 100px; padding-bottom: 50px; color: #444; }
        .contact-mail { color: #fff; text-decoration: none; font-size: 1.1em; letter-spacing: 2px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>Jorge Mendoza</h1>
    <p class="subtitle">ACTOR</p>

<div class="video-grid">
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1174518952?title=0&byline=0&portrait=0" allow="autoplay; fullscreen"></iframe></div>
        
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1177478642?title=0&byline=0&portrait=0" allow="autoplay; fullscreen"></iframe></div>
        
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1177479488?title=0&byline=0&portrait=0" allow="autoplay; fullscreen"></iframe></div>
        
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1166571898?title=0&byline=0&portrait=0" allow="autoplay; fullscreen"></iframe></div>
        
        <div class="video-item"><iframe src="https://player.vimeo.com/video/0?title=0&byline=0&portrait=0" allow="autoplay; fullscreen"></iframe></div>

        <div class="video-item" onclick="expandSlate()">
            <div class="slate-card">
                <div class="data-grid-mini">
                    <div><span class="mini-val">168</span><br><span class="mini-lbl">Alt</span></div>
                    <div><span class="mini-val">67.5</span><br><span class="mini-lbl">Peso</span></div>
                    <div><span class="mini-val">Verdes</span><br><span class="mini-lbl">Ojos</span></div>
                </div>
                <div style="font-size: 0.5em; color: #444; margin-top: 15px; letter-spacing: 2px;">PERFIL COMPLETO</div>
            </div>
        </div>
    </div>
    <div class="gallery-title">Galería</div>
    <div class="gallery-grid">
        <div class="album-box" onclick="openAlbum(1, 31)">
            <img src="Photos/Album1/FOTO_1_1.webp">
            <div class="album-label">Book Actoral</div>
        </div>
        <div class="album-box" onclick="openAlbum(2, 23)">
            <img src="Photos/Album2/FOTO_2_1.webp">
            <div class="album-label">Personajes</div>
        </div>
        <div class="album-box" onclick="openAlbum(3, 10)">
            <img src="Photos/Album3/FOTO_3_1.webp">
            <div class="album-label">Producciones</div>
        </div>
        <div class="album-box" onclick="openAlbum(4, 10)">
            <img src="Photos/Album4/FOTO_4_1.webp">
            <div class="album-label">Publicidad</div>
        </div>
    </div>

    <div id="modal-overlay">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <button id="btn-prev" class="nav-btn prev-btn" onclick="changeImg(-1)">&#10094;</button>
        <img id="modal-image" src="">
        <button id="btn-next" class="nav-btn next-btn" onclick="changeImg(1)">&#10095;</button>
        <div id="modal-content-wrapper" onclick="event.stopPropagation()"></div>
    </div>

    <footer>
        <a href="mailto:contacto.jorgenaranjo@gmail.com" class="contact-mail">contacto.jorgenaranjo@gmail.com</a>
        <p>&copy; 2026 Jorge Mendoza</p>
    </footer>

    <script>
        let currentAlbum = 1;
        let currentImgIdx = 1;
        let maxImgs = 0;

        const overlay = document.getElementById('modal-overlay');
        const modalImg = document.getElementById('modal-image');
        const wrapper = document.getElementById('modal-content-wrapper');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        function openAlbum(albumNum, totalPhotos) {
            currentAlbum = albumNum;
            currentImgIdx = 1;
            maxImgs = totalPhotos;
            overlay.style.display = 'flex';
            modalImg.style.display = 'block';
            wrapper.style.display = 'none';
            btnPrev.style.display = 'flex';
            btnNext.style.display = 'flex';
            updateModalImage();
        }

        function changeImg(step) {
            currentImgIdx += step;
            if (currentImgIdx > maxImgs) currentImgIdx = 1;
            if (currentImgIdx < 1) currentImgIdx = maxImgs;
            updateModalImage();
        }

        function updateModalImage() {
            // LÓGICA DE SUSTITUCIÓN PARA EL ÁLBUM 1
            if (currentAlbum === 1) {
                if (currentImgIdx === 5) { modalImg.src = "Photos/FOTO 1.webp"; return; }
                if (currentImgIdx === 7) { modalImg.src = "Photos/FOTO 2.webp"; return; }
                if (currentImgIdx === 8) { modalImg.src = "Photos/FOTO 3.webp"; return; }
                if (currentImgIdx === 12) { modalImg.src = "Photos/FOTO 4.webp"; return; }
            }
            
            // Si no es una de las "sustituidas", busca la foto normal en su carpeta
            modalImg.src = `Photos/Album${currentAlbum}/FOTO_${currentAlbum}_${currentImgIdx}.webp`;
        }

        function expandSlate() {
            overlay.style.display = 'flex';
            modalImg.style.display = 'none';
            btnPrev.style.display = 'none';
            btnNext.style.display = 'none';
            wrapper.style.display = 'block';
            wrapper.innerHTML = `
                <h2 style="letter-spacing:4px; font-style:italic">JORGE MENDOZA</h2>
                <div class="full-grid">
                    <div class="full-item"><span class="full-val">168cm</span><span class="full-lbl">Estatura</span></div>
                    <div class="full-item"><span class="full-val">67.5kg</span><span class="full-lbl">Peso</span></div>
                    <div class="full-item"><span class="full-val">Verdes</span><span class="full-lbl">Ojos</span></div>
                    <div class="full-item"><span class="full-val">M</span><span class="full-lbl">Camisa</span></div>
                    <div class="full-item"><span class="full-val">29-30</span><span class="full-lbl">Pantalón</span></div>
                    <div class="full-item"><span class="full-val">39</span><span class="full-lbl">Calzado</span></div>
                </div>
                <div style="margin-top:30px; border-top:1px solid #222; padding-top:20px; font-size:0.9em; line-height:1.8">
                    <strong>Nacionalidad:</strong> Colombo-Canadiense<br>
                    <strong>Idiomas:</strong> Español (Nativo) / Inglés (Fluido)<br>
                    <strong>Edad:</strong> 55 años
                </div>
            `;
        }

        function closeModal() { overlay.style.display = 'none'; }
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
            if (overlay.style.display === 'flex' && modalImg.style.display === 'block') {
                if (e.key === "ArrowRight") changeImg(1);
                if (e.key === "ArrowLeft") changeImg(-1);
            }
        });
    </script>
</body>
</html>
