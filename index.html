<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jorge Naranjo | Actor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --bg: #000000; --accent: #1a1a1a; }
        body { 
            background-color: var(--bg); color: var(--primary); 
            font-family: 'Playfair Display', serif; margin: 0; padding: 20px; text-align: center;
            -webkit-user-select: none; user-select: none;
        }
        h1 { font-style: italic; letter-spacing: 4px; font-size: 2.5em; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { letter-spacing: 8px; font-size: 0.9em; text-transform: uppercase; margin-bottom: 40px; color: #888; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto 60px; }
        .video-item { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #111; border-radius: 4px; border: 1px solid #222; }
        .video-item iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* TARJETA DE MEDIDAS INTERACTIVA */
        .slate-card { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #121212; padding: 5px; cursor: pointer; /* Indicar clic */
            transition: 0.3s;
        }
        .slate-card:hover { background: #1a1a1a; border-color: #555; } /* Efecto al pasar mouse */

        .slate-title { font-size: 0.75em; letter-spacing: 3px; color: #888; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; width: 90%; text-transform: uppercase; }
        
        .slate-container { display: flex; width: 95%; gap: 15px; justify-content: center; }
        .slate-table { width: 48%; font-size: 0.65em; text-align: left; border-collapse: collapse; }
        .slate-table td { padding: 3px 0; border-bottom: 1px solid #1a1a1a; }
        .slate-label { color: #666; font-style: italic; }
        .slate-value { color: #fff; text-align: right; font-weight: bold; }

        /* Estilos para la tarjeta cuando está agrandada (en el modal) */
        #modal-slate .slate-card {
            position: relative; width: 90%; max-width: 800px; height: auto; padding: 40px;
            background: #121212; border: 2px solid #fff; border-radius: 8px;
        }
        #modal-slate .slate-title { font-size: 1.5em; margin-bottom: 30px; }
        #modal-slate .slate-table { font-size: 1.2em; }
        #modal-slate .slate-table td { padding: 8px 0; }

        /* GALERÍA */
        .gallery-title { font-style: italic; font-size: 1.8em; margin: 60px 0 30px; border-top: 1px solid #222; padding-top: 40px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .gallery-grid img { width: 100%; height: 350px; object-fit: cover; border-radius: 4px; filter: grayscale(100%); transition: 0.5s ease; cursor: pointer; }
        .gallery-grid img:hover { filter: grayscale(0%); transform: scale(1.02); }

        /* MODALES */
        #modal, #modal-slate { display: none; position: fixed; z-index: 999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        #modal img { max-width: 90%; max-height: 90%; border: 1px solid #fff; }
        .contact-mail { color: #ffffff; text-decoration: none; font-size: 1.2em; letter-spacing: 2px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>Jorge Naranjo</h1>
    <p class="subtitle">VIDEO-BOOK</p>

    <div class="video-grid">
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1174518952?title=0&byline=0&portrait=0" allow="autoplay; fullscreen"></iframe></div>
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1166571898?title=0&byline=0&portrait=0"></iframe></div>
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1166572058?title=0&byline=0&portrait=0"></iframe></div>
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1166572097?title=0&byline=0&portrait=0"></iframe></div>
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1166560186?title=0&byline=0&portrait=0"></iframe></div>

        <div class="video-item" id="slate-reproduction" onclick="openSlateModal()">
            <div class="slate-card">
                <div class="slate-title">Ficha Técnica (cm/kg)</div>
                <div class="slate-container">
                    <table class="slate-table">
                        <tr><td class="slate-label">Altura:</td><td class="slate-value">168 cm</td></tr>
                        <tr><td class="slate-label">Cuello:</td><td class="slate-value">37 cm</td></tr>
                        <tr><td class="slate-label">Pecho:</td><td class="slate-value">106 cm</td></tr>
                        <tr><td class="slate-label">Cintura:</td><td class="slate-value">74 cm</td></tr>
                        <tr><td class="slate-label">Cadera:</td><td class="slate-value">92 cm</td></tr>
                    </table>
                    <table class="slate-table">
                        <tr><td class="slate-label">Espalda:</td><td class="slate-value">47 cm</td></tr>
                        <tr><td class="slate-label">Manga:</td><td class="slate-value">82 cm</td></tr>
                        <tr><td class="slate-label">Codo-Muñeca:</td><td class="slate-value">28 cm</td></tr>
                        <tr><td class="slate-label">Entrepierna:</td><td class="slate-value">69 cm</td></tr>
                        <tr><td class="slate-label">Pierna:</td><td class="slate-value">91 cm</td></tr>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="gallery-title">Galería</div>
    <div class="gallery-grid">
        <img src="Photos/FOTO 1.webp" onclick="openModal(this.src)">
        <img src="Photos/FOTO 2.webp" onclick="openModal(this.src)">
        <img src="Photos/FOTO 3.webp" onclick="openModal(this.src)">
        <img src="Photos/FOTO 4.webp" onclick="openModal(this.src)">
    </div>

    <div id="modal" onclick="this.style.display='none'"><img id="modalImg"></div>

    <div id="modal-slate" onclick="this.style.display='none'">
        </div>

    <footer style="margin-top: 100px; padding-bottom: 50px; color: #555;">
        <p style="letter-spacing: 2px;">CONTACTO</p>
        <a href="mailto:contacto.jorgenaranjo@gmail.com" class="contact-mail">contacto.jorgenaranjo@gmail.com</a>
        <p>&copy; 2026 Jorge Naranjo</p>
    </footer>

    <script>
        // Función para agrandar fotos
        function openModal(src) {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalImg').src = src;
        }

        // Función para agrandar la Ficha Técnica
        function openSlateModal() {
            const modalSlate = document.getElementById('modal-slate');
            const originalCard = document.querySelector('#slate-reproduction .slate-card');
            
            // Limpiamos el modal y copiamos la tarjeta original
            modalSlate.innerHTML = ''; 
            modalSlate.appendChild(originalCard.cloneNode(true));
            
            // Mostramos el modal
            modalSlate.style.display = 'flex';
        }
    </script>
</body>
</html>
