<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jorge Naranjo | Actor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --bg: #000000; --accent: #1a1a1a; }
        body { 
            background-color: var(--bg); color: var(--primary); 
            font-family: 'Playfair Display', serif; margin: 0; padding: 20px; text-align: center;
            -webkit-user-select: none; user-select: none;
        }
        h1 { font-style: italic; letter-spacing: 4px; font-size: 2.5em; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { letter-spacing: 8px; font-size: 0.9em; text-transform: uppercase; margin-bottom: 40px; color: #888; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto 60px; }
        .video-item { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #111; border-radius: 4px; border: 1px solid #222; }
        .video-item iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* FICHA TÉCNICA (SLATE EN TEXTO) */
        .slate-card { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #121212; padding: 10px; cursor: pointer; transition: 0.3s;
        }
        .slate-card:hover { background: #1a1a1a; border: 1px solid #555; }
        .slate-title { font-size: 0.75em; letter-spacing: 3px; color: #888; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 5px; width: 90%; text-transform: uppercase; }
        .slate-container { display: flex; width: 95%; gap: 15px; justify-content: center; }
        .slate-column { width: 48%; }
        .slate-table { width: 100%; font-size: 0.60em; text-align: left; border-collapse: collapse; }
        .slate-table td { padding: 2px 0; border-bottom: 1px solid #1a1a1a; }
        .slate-label { color: #666; font-style: italic; }
        .slate-value { color: #fff; text-align: right; font-weight: bold; }
        .nationality-tag { font-size: 0.50em; color: #444; margin-top: 8px; letter-spacing: 1px; text-transform: uppercase; }

        /* MODAL EXPANSIÓN */
        #modal-overlay { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        #modal-image { max-width: 90%; max-height: 90%; border: 1px solid #fff; display: none; }
        #modal-slate-content { 
            display: none; background: #121212; padding: 40px; border: 2px solid #fff; 
            border-radius: 8px; width: 95%; max-width: 850px; text-align: center; 
        }
        #modal-slate-content .slate-container { display: flex !important; flex-direction: row !important; gap: 50px !important; }

        .gallery-title { font-style: italic; font-size: 1.8em; margin: 60px 0 30px; border-top: 1px solid #222; padding-top: 40px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .gallery-grid img { width: 100%; height: 350px; object-fit: cover; border-radius: 4px; filter: grayscale(100%); transition: 0.5s ease; cursor: pointer; }
        .gallery-grid img:hover { filter: grayscale(0%); transform: scale(1.02); }
        .contact-mail { color: #ffffff; text-decoration: none; font-size: 1.2em; letter-spacing: 2px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>Jorge Naranjo</h1>
    <p class="subtitle">PERFIL ACTORAL</p>

    <div class="video-grid">
        <div class="video-item">
            <iframe src="https://player.vimeo.com/video/1174518952?title=0&byline=0&portrait=0" allow="autoplay; fullscreen"></iframe>
        </div>

        <div class="video-item" onclick="expandSlate()">
            <div class="slate-card" id="main-slate">
                <div class="slate-title">Perfil / Measurements</div>
                <div class="slate-container">
                    <div class="slate-column">
                        <table class="slate-table">
                            <tr><td class="slate-label">Estatura:</td><td class="slate-value">168 cm</td></tr>
                            <tr><td class="slate-label">Peso:</td><td class="slate-value">67.5 kg</td></tr>
                            <tr><td class="slate-label">Ojos:</td><td class="slate-value">Verdes</td></tr>
                            <tr><td class="slate-label">Piel:</td><td class="slate-value">Trigueña</td></tr>
                        </table>
                    </div>
                    <div class="slate-column">
                        <table class="slate-table">
                            <tr><td class="slate-label">Pantalón:</td><td class="slate-value">29-30</td></tr>
                            <tr><td class="slate-label">Camisa:</td><td class="slate-value">M</td></tr>
                            <tr><td class="slate-label">Pecho:</td><td class="slate-value">106 cm</td></tr>
                            <tr><td class="slate-label">Cintura:</td><td class="slate-value">75 cm</td></tr>
                        </table>
                    </div>
                </div>
                <div class="nationality-tag">Colombo-Canadiense</div>
            </div>
        </div>

        <div class="video-item"><iframe src="https://player.vimeo.com/video/1166571898?title=0&byline=0&portrait=0"></iframe></div>
        <div class="video-item"><iframe src="https://player.vimeo.com/video/1166572058?title=0&byline=0&portrait=0"></iframe></div>
    </div>

    <div class="gallery-title">Galería</div>
    <div class="gallery-grid">
        <img src="Photos/FOTO 1.webp" onclick="expandImage(this.src)">
        <img src="Photos/FOTO 2.webp" onclick="expandImage(this.src)">
        <img src="Photos/FOTO 3.webp" onclick="expandImage(this.src)">
        <img src="Photos/FOTO 4.webp" onclick="expandImage(this.src)">
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <img id="modal-image">
        <div id="modal-slate-content" onclick="event.stopPropagation()"></div>
    </div>

    <footer style="margin-top: 100px; padding-bottom: 50px; color: #555;">
        <p style="letter-spacing: 2px;">CONTACTO</p>
        <a href="mailto:contacto.jorgenaranjo@gmail.com" class="contact-mail">contacto.jorgenaranjo@gmail.com</a>
        <p>&copy; 2026 Jorge Naranjo</p>
    </footer>

    <script>
        const overlay = document.getElementById('modal-overlay');
        const modalImg = document.getElementById('modal-image');
        const modalSlate = document.getElementById('modal-slate-content');

        function expandImage(src) {
            overlay.style.display = 'flex';
            modalImg.style.display = 'block';
            modalSlate.style.display = 'none';
            modalImg.src = src;
        }

        function expandSlate() {
            const content = document.getElementById('main-slate').innerHTML;
            modalSlate.innerHTML = content;
            overlay.style.display = 'flex';
            modalImg.style.display = 'none';
            modalSlate.style.display = 'block';
        }

        function closeModal() { overlay.style.display = 'none'; }
    </script>
</body>
</html>
